<div class="row" style="margin-top:40px;">
  <div class="col s10 m6 offset-s1 offset-m3">
    <div class="card-panel">
      <h4 class="center">Connexion</h4>

      @if (errorMessage) {
        <div class="card-panel red lighten-4">{{ errorMessage }}</div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

        <div class="input-field">
          <input type="email" id="email" name="email" required
                 [(ngModel)]="email" #emailRef="ngModel">
          <label for="email">Email</label>
          <div [hidden]="emailRef.valid || emailRef.pristine" class="red-text">
            Email requis
          </div>
        </div>

        <div class="input-field">
          <input type="password" id="password" name="password" required minlength="6"
                 [(ngModel)]="password" #passwordRef="ngModel">
          <label for="password">Mot de passe</label>
          <div [hidden]="passwordRef.valid || passwordRef.pristine" class="red-text">
            Mot de passe requis (6 caractères min)
          </div>
        </div>

        <div class="center" style="margin-top:20px;">
          <button type="submit"
                  [disabled]="!loginForm.form.valid || loading"
                  class="btn waves-effect waves-light">
            {{ loading ? 'Connexion...' : 'Se connecter' }}
          </button>
        </div>
      </form>

      <p class="center" style="margin-top:16px;">
        Pas encore de compte ?
        <a routerLink="/auth/register">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
