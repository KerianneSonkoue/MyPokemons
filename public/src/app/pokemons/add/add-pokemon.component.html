<h2 class="center">Ajouter un Pokémon</h2>

<form (ngSubmit)="onSubmit()" #addForm="ngForm">
  <div class="row">
    <div class="col s8 offset-s2">
      <div class="card-panel">

        <!-- Image -->
        <div class="form-group center">
          <label>Image</label>
          <div style="margin-bottom:10px;">
            <img [src]="pokemon.picture" style="max-height:100px;border-radius:8px;">
          </div>
          <label class="btn btn-small waves-effect waves-light" style="cursor:pointer;">
            Choisir une image
            <input type="file" accept="image/*" (change)="onImageChange($event)" style="display:none;">
          </label>
        </div>

        <!-- Nom -->
        <div class="form-group">
          <label for="name">Nom</label>
          <input type="text" id="name" name="name" class="form-control" required
                 pattern="^[a-zA-Zàéèç ]{1,30}$"
                 [(ngModel)]="pokemon.name" #name="ngModel">
          <div [hidden]="name.valid || name.pristine" class="card-panel red accent-3">
            Le nom est requis (1-30 lettres)
          </div>
        </div>

        <!-- Points de vie -->
        <div class="form-group">
          <label for="hp">Points de vie</label>
          <input type="number" id="hp" name="hp" class="form-control" required
                 min="1" max="999" [(ngModel)]="pokemon.hp" #hp="ngModel">
          <div [hidden]="hp.valid || hp.pristine" class="card-panel red accent-3">
            Valeur entre 1 et 999
          </div>
        </div>

        <!-- Dégâts -->
        <div class="form-group">
          <label for="cp">Dégâts</label>
          <input type="number" id="cp" name="cp" class="form-control" required
                 min="1" max="999" [(ngModel)]="pokemon.cp" #cp="ngModel">
          <div [hidden]="cp.valid || cp.pristine" class="card-panel red accent-3">
            Valeur entre 1 et 999
          </div>
        </div>

        <!-- Rareté -->
        <div class="form-group">
          <label>Rareté ({{ pokemon.rarete }} étoile{{ pokemon.rarete > 1 ? 's' : '' }})</label>
          <input type="range" min="1" max="5" step="1" name="rarete" [(ngModel)]="pokemon.rarete">
          <div style="display:flex;justify-content:space-between;font-size:0.8em;color:#888;">
            <span>Bronze</span><span>Argent</span><span>Or</span>
          </div>
        </div>

        <!-- Types -->
        <div class="form-group">
          <label>Types</label>
          @for (type of types; track type) {
            <p>
              <label [for]="'add-' + type">
                <input type="checkbox"
                       [id]="'add-' + type"
                       [value]="type"
                       [checked]="hasType(type)"
                       [disabled]="!isTypesValid(type)"
                       (change)="selectType($event, type)">
                <span>
                  <div class="{{ type | pokemonTypeColor }}">{{ type }}</div>
                </span>
              </label>
            </p>
          }
        </div>

      </div>
    </div>
  </div>

  <div class="center section">
    <button [disabled]="!addForm.form.valid || pokemon.types.length === 0"
            class="btn waves-effect waves-light">
      Ajouter
    </button>
    <a (click)="goBack()" class="btn waves-effect waves-light grey" style="margin-left:8px;">
      Retour
    </a>
  </div>
</form>
