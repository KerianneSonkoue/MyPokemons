@if (pokemon){

  <form (ngSubmit)="onSubmit()"  #pokemonForm="ngForm">

    <div class="row">
      <div class="col s8 offset-s2">
        <div class="card-panel">
          <div class="form-group center">
            <label>Image</label>
            <div style="margin-bottom: 10px;">
              <img [src]="pokemon.picture" style="max-height: 120px; border-radius: 8px;">
            </div>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center;">
              <label class="btn btn-small waves-effect waves-light" style="cursor:pointer;margin:0;">
                Changer l'image
                <input type="file" accept="image/*" (change)="onImageChange($event)" style="display:none;">
              </label>
              <button type="button" class="btn btn-small waves-effect waves-light blue darken-1"
                      (click)="showEditor = true" style="margin:0;">
                Modifier l'image
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="name">Nom</label>
            <input type="text" 
                   class="form-control" 
                   id="name" 
                   name="name"
                   required
                   [(ngModel)] = "pokemon.name"
                   #name="ngModel"
                   pattern="^[a-zA-Zàéèç]{1,30}$"        
                   >
            
            <div [hidden]="name.valid || name.pristine"
                 class="card-panel red accent-3"
            >
              Le nom du pokémon est requis (1-30)
            </div>

            
          </div>
          <div class="form-group">
            <label for="hp">Point de vie</label>
            <input type="number" 
                   class="form-control" 
                   id="hp" 
                   name="hp"
                   required 
                   [(ngModel)] = "pokemon.hp"
                   #hp="ngModel"
                   pattern="^[0-9]{1,3}$"        
                   >
            
            <div [hidden]="hp.valid || hp.pristine"
                 class="card-panel red accent-3"
            >
              Les points de vie du pokémon est compris entre 1 et 999
            </div>
          </div>
          <div class="form-group">
            <label for="cp">Dégat</label>
            <input type="number" 
                   class="form-control" 
                   id="cp" 
                   name="cp"
                   required 
                   [(ngModel)] = "pokemon.cp"
                   #cp="ngModel"
                   pattern="^[0-9]{1,3}$"        
                   >
            
            <div [hidden]="cp.valid || cp.pristine"
                 class="card-panel red accent-3"
            >
              Les dégâts du pokémon est compris entre 1 et 999
            </div>
          </div>
          <div class="form-group">
            <label>Rareté ({{ pokemon.rarete }} étoile{{ pokemon.rarete > 1 ? 's' : '' }})</label>
            <input type="range" min="1" max="5" step="1"
                   name="rarete" [(ngModel)]="pokemon.rarete">
            <div style="display:flex;justify-content:space-between;font-size:0.8em;color:#888;">
              <span>Bronze</span><span>Argent</span><span>Or</span>
            </div>
          </div>
          <form class="form-group">
            <label>Types</label>
            @for (type of types; track type) {
              <p>
              <label [for]="type">
                <input 
                  type="checkbox"
                  [id]="type"
                  [value]="type"
                  [checked]="hasType(type)"
                  [disabled]="!isTypesValid(type)"
                  (change)="selectType($event, type)"    
                />
                <span>
                  <div class="{{ type | pokemonTypeColor }}">{{ type }}</div>
                </span>
              </label>
              </p>
            }
          </form>
        </div>  
      </div>  
    </div>
    <div class="center section">
      <button [disabled]="!pokemonForm.form.valid" class="btn waves-effect waves-light">Valider</button>
      <a (click)="goBack()" class="btn waves-effect waves-light">Retour</a>
    </div>
  </form>

  @if (showEditor) {
    <image-editor
      [imageUrl]="pokemon.picture"
      (imageChanged)="onImageEdited($event)"
      (cancelled)="showEditor = false">
    </image-editor>
  }

}
